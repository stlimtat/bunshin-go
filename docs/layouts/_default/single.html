{{ define "main" }}
  {{ $title := .Title }}
  <header>
    <h1 class="post-title">{{ $title }}</h1>
    {{ with .Date }}
      <span class="post-date">{{ . | time.Format "2006-01-02" }}</span>
    {{ end }}
  </header>

  {{- if and .Params.toc .TableOfContents }}
  <nav class="toc">
    <h2>On this page</h2>
    {{- .TableOfContents }}
  </nav>
  {{- end }}

  <div class="post-content">
    {{ .Content }}
  </div>
{{ end }}
