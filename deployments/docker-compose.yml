# bunshin-go backend stack.
#
# Services:
#   bunshin   — bunshin-go HTTP server (:8080)
#   postgres  — PostgreSQL 16 + pgvector for VectorStore, MessageStore, CheckpointStore
#   redis     — prompt cache + checkpoint/message store backend
#   minio     — S3-compatible blob store for large messages and sandbox file I/O
#   mcp-mock  — lightweight MCP server stub
#
# Usage:
#   docker compose -f deployments/docker-compose.yml up
#
# For local dev without Postgres/MinIO, remove the depends_on entries and
# set BUNSHIN_STORE=memory to use in-process backends.

services:
  bunshin:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: bunshin-go:dev
    ports:
      - "8080:8080"
    environment:
      BUNSHIN_ADDR: ":8080"
      BUNSHIN_LOG_LEVEL: "info"
      REDIS_URL: "redis:6379"
      DATABASE_URL: "postgres://bunshin:bunshin@postgres:5432/bunshin?sslmode=disable"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "bunshin"
      MINIO_SECRET_KEY: "bunshin-secret"
      MINIO_BUCKET: "bunshin"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bunshin-server", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bunshin
      POSTGRES_USER: bunshin
      POSTGRES_PASSWORD: bunshin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunshin -d bunshin"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: bunshin
      MINIO_ROOT_PASSWORD: bunshin-secret
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Lightweight MCP server stub — replace with a real MCP server image in production.
  mcp-mock:
    image: kennethreitz/httpbin:latest
    ports:
      - "8811:80"
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
