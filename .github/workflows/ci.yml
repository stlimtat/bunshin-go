name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ contains(github.ref, "master") }}

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            go.sum
            **/*.go
      # - name: golangci-lint
      #   uses: golangci/golangci-lint-action@v9
      #   with:
      #     version: latest
      #     args: --timeout=5m
      - name: Download modules
        run: go mod download
      - name: Install gotestfmt
        run: go install github.com/gotesttools/gotestfmt/v2/cmd/gotestfmt@latest
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        shell: bash
        run: |
          go test -race -count=1 -timeout=120s -json -v \
            -coverprofile=cover.out -covermode=atomic ./... 2>&1 |\
          tee /tmp/gotest.log |\
          gotestfmt
      # - name: Integration tests
      #   run: |
      #     go test -race -count=1 -timeout=120s -json -v \
      #       -tags=integration \
      #       -coverprofile=cover.out -covermode=atomic ./... 2>&1 |\
      #     tee /tmp/gotest.log |\
      #     gotestfmt
      #   # Skips cleanly when no integration-tagged test files exist
      - name: Coverage report in html
        run: go tool cover -html=cover.out -o=cover.html
      - name: Upload coverage report in html
        uses: actions/upload-artifact@v7
        with:
          name: cover.html
          path: cover.html
      - name: Build all cmd binaries
        run: go build ./cmd/...
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Dockerfile
          push: false
          tags: bunshin-go:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

