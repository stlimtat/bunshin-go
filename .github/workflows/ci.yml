name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -count=1 -timeout=120s ./...

      - name: Integration tests
        run: go test -race -count=1 -timeout=120s -tags=integration ./...
        # Skips cleanly when no integration-tagged test files exist

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build-cmds:
    name: Build cmd binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build all cmd binaries
        run: go build ./cmd/...

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/Dockerfile
          push: false
          tags: bunshin-go:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-integration:
    name: Docker integration test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -f deployments/Dockerfile -t bunshin-go:dev .

      - name: Start stack
        run: docker compose -f deployments/docker-compose.yml up -d --wait
        timeout-minutes: 3

      - name: Smoke test echo workflow
        run: |
          curl -sf -X POST http://localhost:8080/workflows/echo \
            -H "Content-Type: application/json" \
            -d '{"input": {"message": "hello"}}' | grep -q '"result"'

      - name: Smoke test SSE stream
        run: |
          curl -sf -N --max-time 5 \
            "http://localhost:8080/workflows/echo/stream?input=%7B%22message%22%3A%22hello%22%7D" \
            | grep -q '"type":"done"'

      - name: Tear down
        if: always()
        run: docker compose -f deployments/docker-compose.yml down -v
